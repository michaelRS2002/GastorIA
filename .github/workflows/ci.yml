name: CI Pipeline - Tests Branch

on:
  push:
    branches: [tests]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        working-directory: ./backend
        env:
          AI_PROVIDER: groq
          AI_API_BASE_URL: https://api.groq.com/openai/v1
          AI_API_KEY: test_key_for_ci
          AI_API_MODEL: llama-3.3-70b-versatile
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test_key_for_ci
          FLASK_DEBUG: True
        run: |
          pytest -v --cov=. --cov-report=xml --cov-report=term --cov-fail-under=45
      
      - name: Display test summary
        if: always()
        working-directory: ./backend
        run: |
          echo "✅ Backend tests completed"
          if [ -f "coverage.xml" ]; then
            echo "📊 Coverage report generated"
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend-react
        run: npm ci
      
      - name: Run tests with Vitest
        working-directory: ./frontend-react
        run: npm run test:coverage
      
      - name: Display test summary
        if: always()
        working-directory: ./frontend-react
        run: |
          echo "✅ Frontend tests completed"
          if [ -d "coverage" ]; then
            echo "📊 Coverage report generated"
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          directory: ./frontend-react/coverage
          flags: frontend
          name: frontend-coverage

  lint:
    name: Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: ./frontend-react
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./frontend-react
        run: npm run lint

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: ./frontend-react
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend-react
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-react/dist
          retention-days: 7
