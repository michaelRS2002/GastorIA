name: Backend CI/CD - Render

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'

jobs:
  # Job de testing y linting
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        cd backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,__pycache__
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,__pycache__
    
    - name: Run tests with pytest
      run: |
        cd backend
        pytest -v --cov=. --cov-report=term --cov-fail-under=45
      env:
        AI_PROVIDER: groq
        AI_API_BASE_URL: https://api.groq.com/openai/v1
        AI_API_KEY: test_key_for_ci
        AI_API_MODEL: llama-3.3-70b-versatile
        SUPABASE_URL: https://test.supabase.co
        SUPABASE_KEY: test_key_for_ci
        FLASK_DEBUG: True
    
    - name: Check Python files exist
      run: |
        cd backend
        python -m py_compile app.py
        python -m py_compile models/financial_service.py
  
  # Job de deploy a Render
  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger Render Deploy
      run: |
        curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.RENDER_TOKEN }}" \
          -H "Content-Type: application/json"
