name: Frontend CI/CD - Render

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend-react/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  # Job de testing y linting
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend-react/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd frontend-react
        npm ci
    
    - name: Run linter
      run: |
        cd frontend-react
        npm run lint
    
    - name: Run tests
      run: |
        cd frontend-react
        npm run test:coverage
    
    - name: Build project
      run: |
        cd frontend-react
        npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  
  # Job de deploy a Render
  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger Render Deploy
      run: |
        curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.RENDER_TOKEN }}" \
          -H "Content-Type: application/json"
